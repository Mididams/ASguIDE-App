<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>Fiches complètes SMIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eff6f6;
      --surface: rgba(255, 255, 255, 0.94);
      --border: rgba(15, 23, 42, 0.08);
      --text: #12232f;
      --text-muted: #58707d;
      --primary: #0f766e;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius-xl: 24px;
      --max-width: 1180px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
        radial-gradient(circle at right, rgba(20, 184, 166, 0.12), transparent 24%),
        linear-gradient(180deg, #f8fcfb 0%, var(--bg) 100%);
    }
    .app-background {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.65)),
        linear-gradient(90deg, rgba(15, 118, 110, 0.04) 1px, transparent 1px),
        linear-gradient(rgba(15, 118, 110, 0.04) 1px, transparent 1px);
      background-size: auto, 32px 32px, 32px 32px;
      pointer-events: none;
    }
    .page-shell {
      position: relative;
      z-index: 1;
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 20px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .placeholder {
      padding: 24px;
      display: grid;
      gap: 12px;
      text-align: center;
    }
    .eyebrow {
      margin: 0;
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1, p { margin: 0; }
    p { color: var(--text-muted); }
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      width: fit-content;
      margin: 8px auto 0;
      padding: 0 16px;
      color: var(--primary);
      background: rgba(204, 251, 241, 0.7);
      border: 1px solid rgba(15, 118, 110, 0.18);
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }
    .site-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 24px;
    }
    .site-footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .site-footer-links::before { content: ""; }
    .site-footer-link {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }
    .site-footer-link + .site-footer-link::before {
      content: "-";
      margin-right: 18px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .site-footer-link:hover,
    .site-footer-link:focus-visible {
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .mobile-nav {
      display: none;
    }
    @media (max-width: 960px) {
      .page-shell {
        padding-bottom: calc(116px + env(safe-area-inset-bottom));
      }
      .mobile-nav {
        position: fixed;
        left: 14px;
        right: 14px;
        bottom: 0;
        z-index: 60;
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 8px;
        padding: 10px 10px max(10px, env(safe-area-inset-bottom));
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 22px;
        box-shadow: 0 20px 44px rgba(15, 23, 42, 0.16);
        backdrop-filter: blur(16px);
      }
      .mobile-nav-button {
        display: grid;
        justify-items: center;
        gap: 4px;
        min-width: 0;
        padding: 8px 4px;
        color: var(--text-muted);
        background: transparent;
        border-radius: 16px;
        text-decoration: none;
      }
      .mobile-nav-button.is-active {
        color: #115e59;
        background: rgba(204, 251, 241, 0.72);
      }
      .mobile-nav-icon {
        font-size: 1.1rem;
        line-height: 1;
      }
      .mobile-nav-label {
        max-width: 100%;
        overflow: hidden;
        font-size: 0.62rem;
        font-weight: 800;
        line-height: 1.1;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div class="app-background"></div>
  <main class="page-shell">
    <section class="panel placeholder">
      <p class="eyebrow">Mémo</p>
      <h1>Fiches complètes SMIT</h1>
      <p>Cette page est prête à être remplie.</p>
      <a class="back-link" href="../index.html">Retour à l'application</a>
    </section>
  </main>
  <footer class="page-shell">
    <div class="panel site-footer" aria-label="Liens légaux">
      <div class="site-footer-links">
        <a class="site-footer-link" href="./mentions-legales.html">Mentions légales</a>
        <a class="site-footer-link" href="./politique-confidentialite.html">Politique de confidentialité</a>
      </div>
    </div>
  </footer>
  <nav class="mobile-nav" aria-label="Navigation mobile principale">
    <a class="mobile-nav-button" href="../index.html" data-app-view="medications">
      <span class="mobile-nav-icon" aria-hidden="true">💊</span>
      <span class="mobile-nav-label">Médicaments</span>
    </a>
    <a class="mobile-nav-button is-active" href="../index.html" data-app-view="protocols">
      <span class="mobile-nav-icon" aria-hidden="true">📋</span>
      <span class="mobile-nav-label">Protocoles / Procédures</span>
    </a>
    <a class="mobile-nav-button" href="../index.html" data-app-view="services">
      <span class="mobile-nav-icon" aria-hidden="true">🏥</span>
      <span class="mobile-nav-label">Services</span>
    </a>
    <a class="mobile-nav-button" href="../index.html" data-app-view="emergency-meds">
      <span class="mobile-nav-icon" aria-hidden="true">⚡</span>
      <span class="mobile-nav-label">Médocs d'urgence</span>
    </a>
    <a class="mobile-nav-button" href="../index.html" data-app-view="directories">
      <span class="mobile-nav-icon" aria-hidden="true">☎</span>
      <span class="mobile-nav-label">Annuaires</span>
    </a>
    <a class="mobile-nav-button" href="../index.html" data-app-view="codes">
      <span class="mobile-nav-icon" aria-hidden="true">#</span>
      <span class="mobile-nav-label">Codes / Liens</span>
    </a>
  </nav>
  <script>
    document.querySelectorAll("[data-app-view]").forEach((link) => {
      link.addEventListener("click", () => {
        window.localStorage.setItem(
          "asguide.appState",
          JSON.stringify({ currentView: link.dataset.appView, viewContext: {} })
        );
      });
    });
  </script>
</body>
</html>
